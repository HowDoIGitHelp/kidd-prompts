<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <style>
            body {
                display: flex;
                flex-flow: column nowrap;
                justify-content: center;
                align-items: center;
                height: 100%;
                width: 100%;
                font-family: sans-serif;
            }
            img {
                max-width: 500px;
                height: auto;
            }
            .content {
                display: flex;
                flex-flow: column nowrap;
                justify-content: space-around;
                align-items: center;
                width: 70%;
                padding: 3%;
            }
            .main-image {
                height: 40%;
            }
            .hero-heading {
                font-size: 50px;
                font-family: Inter;
                font-weight: bold;
            }
            img {
                width:100%;
                height:100%;
            }
            .product-name, .hero-description {
                margin-top: 20px;
            }
            .hero-description {
                width: 600px;
                font-size: 20px;
            }
        </style>
    </head>
    <body>
        <div class = "content">
            <div class = "hero-image">
                <img src = "assets/wiki.avif">
            </div>
            <div class = "product-name">
                Wiki
            </div>
            <div class = "hero-heading">
                The wiki that redefines 'wiki'.
            </div>
            <div class = "hero-description">
                It’s hard to move fast if you’ve got a clunky and disorganized workspace. 
                Centralize all your knowledge in Notion instead.
            </div>
        </div>
    </body>
</html>
